###############################################################################
### Hyprland Autostart
# -----------------------------------------------------------------------------
# - Define variáveis de programas principais
# - Importa arquivos de configuração separados
# - Modular e fácil manutenção
###############################################################################

# =========================
# Variáveis de programas
###############################################################################
$terminal = kitty
$fileManager = nemo
$menu = rofi -show drun

# =========================
# Importação de configs adicionais
###############################################################################
source = ~/.config/hypr/configs/autostart.conf
source = ~/.config/hypr/configs/env.conf
source = ~/.config/hypr/configs/input.conf
source = ~/.config/hypr/configs/monitors.conf
source = ~/.config/hypr/configs/general.conf
source = ~/.config/hypr/configs/binds.conf
source = ~/.config/hypr/configs/windows_workspaces.conf
source = ~/.config/hypr/configs/permissions.conf


