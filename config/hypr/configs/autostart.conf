##################################################
# Hyprland Autostart
# -----------------------------------------------
# - Configura temas GTK/Qt para modo dark
# - Inicializa agentes e serviços do usuário
# - Inicia Waybar (barra superior)
# - Mantido modular e seguro
##################################################

##############################
### TEMAS GTK / Qt ###
##############################

# Define tema GTK3 para modo dark
exec = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3-dark"

# Define esquema de cores para GTK4 apps
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"

# Define tema Qt para apps Qt6 (opcional)
env = QT_QPA_PLATFORMTHEME,qt6ct

##############################
### AGENTES / SERVIÇOS ###
##############################

# Polkit agent para autenticação
exec-once = systemctl --user start hyprpolkitagent

##############################
### BARRAS / WALLPAPER ###
##############################

# Inicia Waybar (barra do desktop)
exec-once = waybar

# exec-once = hyprlock -c ~/.config/hypr/hyprlock.conf