# --------------------------------------------------
# JANELAS E WORKSPACES
# --------------------------------------------------

# Referências:
# https://wiki.hyprland.org/Configuring/Window-Rules/
# https://wiki.hyprland.org/Configuring/Workspace-Rules/

# --------------------------------------------------
# REGRAS DE OPACIDADE
# --------------------------------------------------

# Aplica opacidade para aplicações específicas
# Melhora a consistência visual com temas transparentes

windowrule = opacity 0.9, match:class ^(Spotify|$discordClient|Postman)$
windowrule = opacity 0.9, match:class code

# Exemplo (desativado)
# windowrule = opacity 0.9, match:class zen

# --------------------------------------------------
# COMPORTAMENTO DAS JANELAS
# --------------------------------------------------

# Ignora solicitações de maximizar vindas das aplicações
# Evita que apps forcem estado maximizado ou fullscreen

windowrule = suppress_event maximize, match:class .*

# Corrige problemas de foco com janelas XWayland flutuantes
# Evita roubo de foco ou falhas ao arrastar janelas

windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# --------------------------------------------------
# REGRAS OPCIONAIS (DESATIVADAS)
# --------------------------------------------------

# Remove blur de aplicações específicas
# windowrulev2 = noblur, class:^(code)$

# Remove borda em um workspace específico
# windowrulev2 = noborder, onworkspace:w[t1]

# Remove arredondamento em um workspace específico
# windowrulev2 = norounding, onworkspace:w[t1]

# --------------------------------------------------
# CONFIGURAÇÃO DE DEBUG
# --------------------------------------------------

debug {
    # Ativa suporte completo ao protocolo de gerenciamento de cores
    full_cm_proto = false
    damage_tracking = 0
}