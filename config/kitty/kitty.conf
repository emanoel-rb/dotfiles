###############################################################################
# Kitty Configuration - Cyberpunk Neon Escuro
# -----------------------------------------------------------------------------
# - Terminal visualmente inspirado em cyberpunk neon
# - Cursor grosso e cor cyan
# - Transparência ajustável
# - Paleta de cores neon para texto, fundo e bordas
# - Suporte a URLs e visual bell
# - Tabs com cores distintas
# - Fonte Nerd Font para compatibilidade com ícones
###############################################################################

# Desativa som do terminal
enable_audio_bell no

###############################################################################
# Cursor
###############################################################################
# Cursor grosso em formato bloco
cursor_shape block
# Cor do cursor
cursor #00ffff
# Cor do texto do cursor
cursor_text_color background

###############################################################################
# Transparência e cores básicas
###############################################################################
# Transparência do terminal (0-1)
background_opacity 0.85
# Cor de fundo
background #1a1a1a
# Cor do texto padrão
foreground #c0c0c0

###############################################################################
# URLs e visual bell
###############################################################################
# Cor de links/URLs
url_color #00ffff
# Cor do flash visual
visual_bell_color #00ff00
# Cor da borda do flash visual
bell_border_color #00ff00

###############################################################################
# Bordas da janela
###############################################################################
# Borda da janela ativa
active_border_color #ff00ff
# Borda da janela inativaway
inactive_border_color #666666

###############################################################################
# Seleção de texto
###############################################################################
# Cor do texto selecionado
selection_foreground #000000
# Cor de fundo da seleção
selection_background #00ff00

###############################################################################
# Tabs
###############################################################################
active_tab_foreground #00ffff
active_tab_background #222222
inactive_tab_foreground #666666
inactive_tab_background #111111

###############################################################################
# Paleta de cores (Cyberpunk Neon)
###############################################################################
color0  #1a1a1a
color1  #ff5555
color2  #50fa7b
color3  #f1fa8c
color4  #bd93f9
color5  #ff79c6
color6  #8be9fd
color7  #f8f8f2
color8  #555555
color9  #ff6e6e
color10 #69ff94
color11 #ffffa5
color12 #d6acff
color13 #ff92df
color14 #a4ffff
color15 #ffffff

###############################################################################
# Fonte
###############################################################################
# Fonte principal
font_family "JetBrains Mono Nerd Font"
# Negrito automático
bold_font auto
# Itálico automático
italic_font auto
# Negrito + itálico automático
bold_italic_font auto
# Tamanho da fonte
font_size 12.0